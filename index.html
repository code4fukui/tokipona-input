<!DOCTYPE html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width"><link rel="icon" href="data:">
<title>tokipona-input</title></head><body>


<h1>tokipona-input / <span class=tokipona>ilo sitelen pi toki pona</span></h1>

in Latin alphabet<br>
<textarea id="talatin" spellcheck="false"></textarea>
in Tokipona
<textarea id="tatokipona" class="tokipona" spellcheck="false"></textarea>

<script type="module">
talatin.onkeyup = () => {
  tatokipona.value = talatin.value;
};
tatokipona.onkeyup = () => {
  talatin.value = tatokipona.value;
};
</script>

@font-face {

  font-weight: normal;
  font-style: normal;
}

	display: block;
	padding: 5px;
	margin: 20px;
	width: 90%;
	height: 30vh;
}

}
